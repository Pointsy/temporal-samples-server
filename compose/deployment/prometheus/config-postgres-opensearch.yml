global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: temporal-postgres-opensearch

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: temporal
    metrics_path: /metrics
    static_configs:
      - targets:
          - temporal:8000

  - job_name: postgres-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - postgres-exporter:9187
